name: update-report

# Refreshes the static Kalshi universe report on a cron and publishes to GitHub Pages.
#
# Public Kalshi endpoints don't need auth, so this workflow needs no secrets.
# The only state that persists between runs is the HTML artifact itself —
# the SQLite DB is rebuilt fresh inside the runner each time (small, fast,
# avoids the complexity of committing a binary).

on:
  schedule:
    # every 30 min. Cron on GitHub Actions is best-effort: runs may be
    # delayed under load. That's fine for a universe snapshot.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # allow manual "rebuild now" from the Actions UI
  push:
    branches: [main]      # also rebuild whenever code / config changes

permissions:
  contents: write        # needed to push to data-snapshots branch
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync deps
        run: uv sync --frozen || uv sync

      - name: Init DB
        run: uv run kalshi-edge init-db

      - name: Pull universe (targeted series)
        # Targeted series list beats a full scan: Kalshi's open-markets feed
        # is dominated by MV parlay aggregates that we skip anyway.
        run: |
          uv run kalshi-edge pull-universe \
            --series "KXHIGHNY,KXHIGHLAX,KXHIGHCHI,KXHIGHMIA,KXHIGHAUS,KXHIGHDEN,KXHIGHPHIL,KXHIGHPHX,KXCPIYOY,KXCPI,KXFED,KXFEDDECISION,KXNBAGAME,KXNHL,KXATPMATCH,KXMLBGAME,KXPRES,KXSEN,KXHOUSE,KXGOV,KXELECT,KXPRIMARY"

      - name: Pull fundamental inputs (automated + analyst YAML)
        # Automated FRED pulls feed the CPI quantamental forecaster's
        # prior-shift integration. The manual loader walks analyst_inputs/
        # and rejects any malformed YAML (strict mode is the default). If
        # FRED_API_KEY is not set as a secret, the automated half is a
        # no-op and only the analyst YAML lands in the DB.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run kalshi-edge pull-fundamental

      - name: Calibrate fundamental loadings
        # Refits β for every CPI input from FRED history and writes to
        # fundamental_loadings. Skipped automatically (soft fail) if FRED
        # is down or no key is configured; the QF forecaster then falls
        # back to the quant-only posterior and records "uncalibrated_loading"
        # in its attribution log for each input.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run kalshi-edge calibrate-loadings || echo "calibration skipped (likely no FRED_API_KEY)"

      - name: Run forecasters
        # Weather → Open-Meteo (public). Economics → FRED (quantamental when
        # fundamental inputs + loadings are present). Sports → the-odds-api.
        # Rates → Polymarket FOMC cross-market prior. Politics → Polymarket
        # cross-market prior. Each forecaster abstains with an explicit
        # reason when its data source or a match is missing, per the
        # project "no fake precision" rule.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: uv run kalshi-edge forecast

      - name: Build research briefs
        # Writes one Markdown brief per contract under site/quantamental/briefs/
        # so the quantamental subsite can link to them and GH Pages serves
        # them as part of the deployed artifact.
        run: uv run kalshi-edge build-briefs --out site/quantamental/briefs

      - name: Build HTML report (universe)
        # The main universe page is pure-quant: no nav-sub, no fundamental
        # attribution blocks. Keeps the original kalshi-edge surface intact.
        run: uv run kalshi-edge build-report --out site/index.html

      - name: Build quantamental subsite
        # Three pages under /quantamental/: overview, research queue, and
        # calibration split. Linked *from* the nav-sub inside the subsite
        # only; the universe page intentionally does not link down.
        run: uv run kalshi-edge build-quantamental --out site/quantamental

      - name: Check out data-snapshots corpus
        # Checkout the orphan branch that accumulates our NDJSON forecast
        # history. The branch is created on first run below if missing.
        uses: actions/checkout@v4
        with:
          ref: data-snapshots
          path: _data
        continue-on-error: true

      - name: Ensure data-snapshots worktree
        # First-run bootstrap: if the branch doesn't exist yet, initialize
        # an orphan commit locally and let the push step create the
        # upstream branch. Idempotent — a no-op on subsequent runs.
        run: |
          if [ ! -d _data/.git ]; then
            rm -rf _data
            mkdir _data
            cd _data
            git init -q -b data-snapshots
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
            git commit --allow-empty -q -m "initial data-snapshots branch"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Pull Kalshi resolutions
        # Walks the configured series for recently settled markets and
        # writes outcomes to the ``resolutions`` table so the NDJSON dump
        # captures them. 48h window is enough given a 30m cron — we don't
        # want to re-ingest the whole settled archive each run.
        run: uv run kalshi-edge pull-resolutions

      - name: Dump DB to NDJSON corpus
        # Appends today's forecasts / snapshots / resolutions / contracts
        # to the data-snapshots worktree. Idempotent within a UTC day.
        run: uv run kalshi-edge dump-history --out _data

      - name: Commit + push data-snapshots
        # Only pushes if there is actual content to add; a no-op run (e.g.
        # a re-trigger in the same minute) makes no commit.
        run: |
          cd _data
          git config user.name  "kalshi-edge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "data-snapshots: nothing new to commit"
          else
            git commit -q -m "data snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Force push is safe here: we're the only writer and the branch
            # is orphan / append-only — avoids fast-forward failures if a
            # concurrent run raced us.
            git push -u -f origin data-snapshots
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backtest report
        # Reads the accumulated NDJSON corpus (including the commit we
        # just made) and writes site/quantamental/backtest.html. Safe to
        # run even when the corpus is empty — produces a "no data yet"
        # placeholder.
        run: uv run kalshi-edge backtest --data-dir _data --out site/quantamental/backtest.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
